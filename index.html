}catch(e){
setMsgs(p=>[…p,{role:“assistant”,content:“⚠️ تعذر الاتصال بالخادم.\n\nتأكد من اتصالك بالإنترنت وحاول مرة أخرى.”,time:new Date(),mode:m}]);
}finally{setLoading(false);setPipe([]);setPipeIdx(-1)}
},[mode,msgs,loading,runPipe]);

const fmt=(text)=>text.split(”\n”).map((line,i)=>{

React.createElement(“span”,null,t.replace(/^\d+[.)]\s*/,””)));

React.createElement(“span”,{className:“bullet-dot”},“◆”),
React.createElement(“span”,null,t.slice(2)));
return React.createElement(“p”,{key:i},t);
});

const now=()=>new Date().toLocaleTimeString(“ar-EG”,{hour:“2-digit”,minute:“2-digit”});

return React.createElement(“div”,{className:“app”},
// BG
React.createElement(“div”,{className:“bg-orb bg-orb-1”}),

// Sidebar
React.createElement(“aside”,{className:“sidebar”+(sidebar?””:” hidden”)},
React.createElement(“div”,{className:“sidebar-logo”},
React.createElement(“div”,{className:“logo-icon”},“🏛️”,React.createElement(“div”,{className:“logo-dot”})),
React.createElement(“div”,null,
React.createElement(“div”,{className:“logo-text”},“أركان”),
React.createElement(“div”,{className:“logo-sub”},“ARKAN AGENT”))),
React.createElement(“div”,{className:“stats”},
[{n:stats.total,l:“إجمالي”,c:”#D4A017”},{n:stats.lessons,l:“دروس”,c:”#4CAF50”},{n:stats.tasks,l:“مهام”,c:”#2196F3”}].map((s,i)=>
React.createElement(“div”,{key:i,className:“stat”,style:{background:s.c+“08”}},
React.createElement(“div”,{className:“stat-num”,style:{color:s.c}},s.n),
React.createElement(“div”,{className:“stat-label”},s.l)))),
React.createElement(“div”,{className:“modes”},
React.createElement(“div”,{className:“modes-title”},“أوضاع العمل”),
MODES.map(m=>React.createElement(“button”,{key:m.id,className:“mode-btn”+(mode===m.id?” active”:””),

React.createElement(“span”,{className:“icon”,style:{filter:mode===m.id?“none”:“grayscale(0.5)”}},m.icon),
